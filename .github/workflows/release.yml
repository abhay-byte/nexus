name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  # ─── Linux x86_64 ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexus ${{ github.ref_name }}"
          releaseBody: |
            ## Nexus ${{ github.ref_name }}

            Multi-agent AI terminal workspace — run Claude Code, Codex CLI, Gemini CLI, and more, side-by-side.

            ### Downloads
            | Platform | File |
            |---|---|
            | Linux x86_64 | `.AppImage` / `.deb` |
            | Windows x86_64 | `.msi` / `.exe` |
            | Windows ARM64 | `.msi` / `.exe` |

            See the **[Installation guide](https://github.com/abhay-byte/nexus#install)** in the README.
          releaseDraft: false
          prerelease: false

  # ─── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows-x86:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Windows x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexus ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

  # ─── Windows ARM64 ───────────────────────────────────────────────────────────
  build-windows-arm:
    name: Windows (ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Windows ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexus ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target aarch64-pc-windows-msvc
