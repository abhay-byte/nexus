name: Release Packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux binary
        run: |
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Package Linux archive
        run: ./scripts/package-release.sh x64 src-tauri/target/release/nexus

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: Nexus_linux_x64
          path: dist/release/Nexus_linux_x64.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    name: Linux (arm64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux binary
        run: |
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Package Linux archive
        run: ./scripts/package-release.sh arm64 src-tauri/target/release/nexus

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: Nexus_linux_arm64
          path: dist/release/Nexus_linux_arm64.tar.gz
          if-no-files-found: error

  build-windows-x64:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows binary
        run: |
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Package Windows archive
        shell: pwsh
        run: ./scripts/package-release.ps1 -Arch x64 -BinaryPath src-tauri/target/release/nexus.exe

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Nexus_windows_x64
          path: dist/release/Nexus_windows_x64.zip
          if-no-files-found: error

  build-windows-arm64:
    name: Windows (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows ARM64 binary
        run: |
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml --release --target aarch64-pc-windows-msvc

      - name: Package Windows archive
        shell: pwsh
        run: ./scripts/package-release.ps1 -Arch arm64 -BinaryPath src-tauri/target/aarch64-pc-windows-msvc/release/nexus.exe

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Nexus_windows_arm64
          path: dist/release/Nexus_windows_arm64.zip
          if-no-files-found: error
