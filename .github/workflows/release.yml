name: Release

# Manual dispatch only — no auto-trigger on tag push
on:
  workflow_dispatch:

jobs:

  # ─── Linux x86_64 ─────────────────────────────────────────────────────────────
  build-linux-x86:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Linux x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.1
          releaseName: "Nexus v0.1.1"
          releaseDraft: false
          prerelease: false

  # ─── Linux ARM64 ───────────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Linux ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.1
          releaseName: "Nexus v0.1.1"
          releaseDraft: false
          prerelease: false

  # ─── Windows x86_64 ───────────────────────────────────────────────────────────
  build-windows-x86:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Windows x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.1
          releaseName: "Nexus v0.1.1"
          releaseDraft: false
          prerelease: false

  # ─── Windows ARM64 ────────────────────────────────────────────────────────────
  build-windows-arm64:
    name: Windows (ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Windows ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.1
          releaseName: "Nexus v0.1.1"
          releaseDraft: false
          prerelease: false
          args: --target aarch64-pc-windows-msvc
